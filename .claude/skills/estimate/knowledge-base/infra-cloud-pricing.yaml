environment_profiles:
  dev:
    sizing: small
    ha: false
    multi_az: false
    notes: "Development environment — single instance, no redundancy"
  staging:
    sizing: small
    ha: false
    multi_az: false
    notes: "Staging environment — mirrors dev sizing"
  production:
    sizing: large
    ha: true
    multi_az: true
    notes: "Production — HA enabled, multi-AZ for databases and cache"
  uat:
    sizing: small
    ha: false
    multi_az: false
    notes: "UAT environment — same as staging"
