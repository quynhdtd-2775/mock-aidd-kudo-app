management:
  typical_roles:
  - pm
  - brse
  split:
    pm: 0.506
    brse: 0.494
# BrSE and PM are separate overhead, not part of per-task dev splits.
# Infra effort uses the infrastructure task type (infra: 1.0).
management_overhead:
  pm:
    pct_of_total: 0.10
    description: Project management overhead (~10% of total dev MD)
  brse:
    tiers:
      middle_solo:
        ratio: "1:4"
        pct_of_dev: 0.25
        description: BrSE middle, no comtor (~25% of dev MD, 1 BrSE per 4 devs)
      middle_with_comtor:
        ratio: "1:7"
        pct_of_dev: 0.14
        description: BrSE middle + 1 comtor (~14% of dev MD, 1 BrSE per 7 devs)
      lead_with_comtor:
        ratio: "1:10"
        pct_of_dev: 0.09
        description: BrSE lead/PSM + 1 comtor (~9% of dev MD, 1 BrSE per 10-12 devs)
    default_tier: middle_with_comtor
    description: BrSE overhead varies by seniority and comtor support
