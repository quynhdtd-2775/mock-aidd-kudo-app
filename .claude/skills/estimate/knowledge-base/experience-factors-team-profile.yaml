# Team Profile Experience Factors
# These multipliers adjust estimates based on team characteristics

experience_levels:
  junior:  # 0-2 years experience
    multiplier: 1.3
    description: "Less experienced, needs more time and guidance"
    per_role: {}
  mid:  # 3-5 years experience
    multiplier: 1.0
    description: "Standard baseline for estimation"
    per_role: {}
  senior:  # 5+ years experience
    multiplier: 0.8
    description: "Experienced developer, faster delivery"
    per_role: {}

domain_familiarity:
  new:  # First time with this domain
    multiplier: 1.25
    description: "New domain requires learning curve"
  familiar:  # Some experience with domain
    multiplier: 1.0
    description: "Standard baseline familiarity"
  expert:  # Deep domain knowledge
    multiplier: 0.85
    description: "Expert knowledge speeds delivery"

team_size_factors:
  solo:  # 1 person
    multiplier: 1.0
    min_size: 1
    max_size: 1
    description: "Single developer, no coordination overhead"
  small:  # 2-3 people
    multiplier: 0.95
    min_size: 2
    max_size: 3
    description: "Small team, slight efficiency gain from collaboration"
  medium:  # 4-6 people
    multiplier: 1.1
    min_size: 4
    max_size: 6
    description: "Medium team, communication overhead increases"
  large:  # 7+ people
    multiplier: 1.25
    min_size: 7
    max_size: 999
    description: "Large team, significant coordination needed"
